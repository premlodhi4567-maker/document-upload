<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Marriage Token Document Upload</title>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
	<style>
		:root { --primary: #1a73e8; --success: #2e7d32; --danger: #d93025; --touch-target: 44px; }
		* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
		body { margin: 0; padding: 15px; font-family: sans-serif; background: #fff; min-height: 100vh; }
		.container { max-width: 650px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(255,105,180,0.15); border: 2px solid #ff69b4; }
		.adv-section { background: #fffacd; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 2px solid #ffd700; }
		.adv-input { width: 100%; padding: 16px; border: 2px solid #ffd700; border-radius: 8px; font-size: 1.2em; font-weight: bold; text-align: center; background: #fffacd; }
		.section { margin-bottom: 20px; padding: 15px; border-radius: 10px; border-top: 5px solid #00bfff; background: #fff; box-shadow: 0 2px 10px rgba(0,191,255,0.1); }
		.boy { border-color: #00bfff; } .girl { border-color: #ff69b4; } .wit { border-color: #9370db; } .marr { border-color: #ffa500; }
		.section-title { font-weight: bold; display: block; margin-bottom: 15px; color: #444; text-transform: uppercase; }
		.field { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; position: relative; }
        .field.error { border: 2px solid red; padding: 10px; border-radius: 8px; background: #fff5f5; }
		label { font-weight: 600; display: block; margin-bottom: 8px; font-size: 0.9em; }
		.req { color: var(--danger); }
        .opt { color: #666; font-style: italic; font-size: 0.8em; }
		input[type="file"] { display: none; }
		.button-group { display: flex; gap: 10px; margin-top: 8px; }
		.btn-upload, .btn-cam { flex: 1; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; border: 2px solid #00bfff; background: white; color: #0066cc; }
		.btn-upload { border-color: #ffa500; color: #ff8c00; }
		.thumb-preview { max-width: 100%; max-height: 120px; display: block; margin: 10px auto; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
		#btn-submit { width: 100%; padding: 20px; background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%); color: #fff; border: none; border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 20px; }
		
		/* Modals */
		#cam-modal, #crop-modal, #success-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; flex-direction:column; align-items:center; justify-content:center; }
		#video { width:100%; height:70%; object-fit: cover; }
		.shutter { width:80px; height:80px; background:#fff; border-radius:50%; margin: 20px auto; border: 5px solid #444; cursor: pointer; }
		
        /* Success Popup UI */
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(0,255,0,0.3); }
        .success-icon { font-size: 50px; color: #2e7d32; margin-bottom: 10px; }
        .big-id { font-size: 3em; font-weight: 900; color: #d93025; margin: 20px 0; display: block; animation: flash 0.8s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .modal-btn { background: #2e7d32; color: white; border: none; padding: 15px 40px; border-radius: 10px; font-size: 1.2em; font-weight: bold; cursor: pointer; width: 100%; }

		#crop-container { flex:1; display:flex; justify-content:center; align-items:center; padding:10px; background:#222; width: 100%; }
		#crop-image { max-width:100%; }
		.crop-controls { background:#333; padding:15px; display:flex; justify-content:center; gap:15px; width: 100%; }
		.crop-btn { padding:12px 24px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
		.crop-ok { background:#4CAF50; color:#fff; }
		.crop-cancel { background:#f44336; color:#fff; }
		#status { margin-top: 15px; text-align: center; font-weight: bold; padding: 15px; }
		.progress-bar { width: 100%; height: 6px; background: #e0e0e0; border-radius: 3px; margin: 10px 0; overflow: hidden; }
		.progress-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.3s; }
	</style>
</head>
<body>

<div id="success-modal">
    <div class="modal-content">
        <div class="success-icon">✔</div>
        <h2 style="margin:0;">UPLOAD SUCCESS</h2>
        <p style="color:#666;">Your Folder ID is:</p>
        <span class="big-id" id="display-id">----</span>
        <button class="modal-btn" onclick="location.reload()">OK (Please fill Second Form)</button>
    </div>
</div>

<div id="cam-modal">
	<video id="video" autoplay playsinline></video>
	<div class="shutter" onclick="captureImage()"></div>
	<button style="color:#fff; background:none; border:none; padding:10px; cursor:pointer;" onclick="stopCam()">[ CANCEL ]</button>
</div>

<div id="crop-modal">
	<div id="crop-container"><img id="crop-image"></div>
	<div class="crop-controls">
		<button class="crop-btn crop-ok" onclick="applyCrop()">✓ OK</button>
		<button class="crop-btn crop-cancel" onclick="closeCropModal()">✗ CANCEL</button>
	</div>
</div>

<div class="container">
	<h2 style="text-align:center; color:var(--primary);">Marriage Portal</h2>
	
	<div class="adv-section">
		<label>Folder ID <span class="req">*</span></label>
		<input type="text" id="adv_name" class="adv-input" readonly placeholder="Fetching ID...">
	</div>

	<div class="section boy">
		<span class="section-title">Boy Documents</span>
		<div class="field" data-req="true"><label>Photo <span class="req">*</span> (20KB)</label><input type="file" id="b_photo" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('b_photo').click()">Upload</button><button class="btn-cam" onclick="startCam('b_photo')">Capture</button></div></div>
		<div class="field" data-req="true"><label>PAN Card <span class="req">*</span> (60KB)</label><input type="file" id="b_pan" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('b_pan').click()">Upload</button><button class="btn-cam" onclick="startCam('b_pan')">Capture</button></div></div>
		<div class="field" data-req="true"><label>Marksheet <span class="req">*</span> (60KB)</label><input type="file" id="b_mark" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('b_mark').click()">Upload</button><button class="btn-cam" onclick="startCam('b_mark')">Capture</button></div></div>
		<div class="field" data-req="true"><label>Affidavit <span class="req">*</span> (60KB)</label><input type="file" id="b_aff" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('b_aff').click()">Upload</button><button class="btn-cam" onclick="startCam('b_aff')">Capture</button></div></div>
		<div class="field" data-req="true"><label>Aadhar Front <span class="req">*</span></label><input type="file" id="b_af" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('b_af').click()">Upload</button><button class="btn-cam" onclick="startCam('b_af')">Capture</button></div></div>
		<div class="field"><label>Aadhar Back <span class="opt">(Optional)</span></label><input type="file" id="b_ab" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('b_ab').click()">Upload</button><button class="btn-cam" onclick="startCam('b_ab')">Capture</button></div></div>
	</div>

	<div class="section girl">
		<span class="section-title">Girl Documents</span>
		<div class="field" data-req="true"><label>Photo <span class="req">*</span> (20KB)</label><input type="file" id="g_photo" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('g_photo').click()">Upload</button><button class="btn-cam" onclick="startCam('g_photo')">Capture</button></div></div>
		<div class="field" data-req="true"><label>PAN Card <span class="req">*</span> (60KB)</label><input type="file" id="g_pan" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('g_pan').click()">Upload</button><button class="btn-cam" onclick="startCam('g_pan')">Capture</button></div></div>
		<div class="field" data-req="true"><label>Marksheet <span class="req">*</span> (60KB)</label><input type="file" id="g_mark" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('g_mark').click()">Upload</button><button class="btn-cam" onclick="startCam('g_mark')">Capture</button></div></div>
		<div class="field" data-req="true"><label>Affidavit <span class="req">*</span> (60KB)</label><input type="file" id="g_aff" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('g_aff').click()">Upload</button><button class="btn-cam" onclick="startCam('g_aff')">Capture</button></div></div>
		<div class="field" data-req="true"><label>Aadhar Front <span class="req">*</span></label><input type="file" id="g_af" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('g_af').click()">Upload</button><button class="btn-cam" onclick="startCam('g_af')">Capture</button></div></div>
		<div class="field"><label>Aadhar Back <span class="opt">(Optional)</span></label><input type="file" id="g_ab" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('g_ab').click()">Upload</button><button class="btn-cam" onclick="startCam('g_ab')">Capture</button></div></div>
	</div>

	<div class="section marr">
		<span class="section-title">Marriage Details</span>
		<div class="field" data-req="true"><label>Marriage Certificate <span class="req">*</span> (60KB)</label><input type="file" id="m_cert" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('m_cert').click()">Upload</button><button class="btn-cam" onclick="startCam('m_cert')">Capture</button></div></div>
	</div>

	<div class="section wit">
		<span class="section-title">Witnesses</span>
		<div class="field" data-req="true"><label>W1 Photo <span class="req">*</span> (20KB)</label><input type="file" id="w1_photo" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('w1_photo').click()">Upload</button><button class="btn-cam" onclick="startCam('w1_photo')">Capture</button></div></div>
		<div class="field" data-req="true"><label>W1 Affidavit <span class="req">*</span> (60KB)</label><input type="file" id="w1_aff" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('w1_aff').click()">Upload</button><button class="btn-cam" onclick="startCam('w1_aff')">Capture</button></div></div>
		<div class="field" data-req="true"><label>W1 Aadhar Front <span class="req">*</span></label><input type="file" id="w1_af" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('w1_af').click()">Upload</button><button class="btn-cam" onclick="startCam('w1_af')">Capture</button></div></div>
		<div class="field"><label>W1 Aadhar Back <span class="opt">(Optional)</span></label><input type="file" id="w1_ab" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('w1_ab').click()">Upload</button><button class="btn-cam" onclick="startCam('w1_ab')">Capture</button></div></div>
		<hr>
		<div class="field" data-req="true"><label>W2 Photo <span class="req">*</span> (20KB)</label><input type="file" id="w2_photo" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('w2_photo').click()">Upload</button><button class="btn-cam" onclick="startCam('w2_photo')">Capture</button></div></div>
		<div class="field" data-req="true"><label>W2 Aadhar Front <span class="req">*</span></label><input type="file" id="w2_af" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('w2_af').click()">Upload</button><button class="btn-cam" onclick="startCam('w2_af')">Capture</button></div></div>
		<div class="field"><label>W2 Aadhar Back <span class="opt">(Optional)</span></label><input type="file" id="w2_ab" onchange="showThumb(this)" accept="image/*"><div class="button-group"><button class="btn-upload" onclick="document.getElementById('w2_ab').click()">Upload</button><button class="btn-cam" onclick="startCam('w2_ab')">Capture</button></div></div>
	</div>

	<button id="btn-submit" onclick="uploadToDrive()">SUBMIT ALL DOCUMENTS</button>
	<div id="status"></div>
</div>

<script>
	const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwePRZutgQObbH8bb9Ms6yC5jKCQKFDI_ZU_OGqOWK11jTIZKT83M_R7KC4GUnNtUt0/exec';
	let activeId = '';
	let cropper = null;
	const video = document.getElementById('video');

	async function fetchID() {
		try {
			const r = await fetch(GOOGLE_SCRIPT_URL);
			const id = await r.text();
			document.getElementById('adv_name').value = id.trim();
		} catch (e) { document.getElementById('adv_name').value = "ID-" + Math.floor(Math.random()*9000); }
	}
	fetchID();

	function startCam(id) {
		activeId = id;
		navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
		.then(s => { video.srcObject = s; document.getElementById('cam-modal').style.display = 'flex'; })
		.catch(e => alert("Camera Access Denied"));
	}

	function stopCam() {
		if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
		document.getElementById('cam-modal').style.display = 'none';
	}

	function captureImage() {
		const canvas = document.createElement('canvas');
		canvas.width = video.videoWidth; canvas.height = video.videoHeight;
		canvas.getContext('2d').drawImage(video, 0, 0);
		const data = canvas.toDataURL('image/jpeg');
		stopCam();
		openCrop(data);
	}

	function openCrop(src) {
		const img = document.getElementById('crop-image');
		img.src = src;
		document.getElementById('crop-modal').style.display = 'flex';
		if(cropper) cropper.destroy();
		cropper = new Cropper(img, { viewMode: 1, autoCropArea: 0.9 });
	}

	function applyCrop() {
		const canvas = cropper.getCroppedCanvas();
		canvas.toBlob(blob => {
			const file = new File([blob], "capture.jpg", {type:"image/jpeg"});
			const dt = new DataTransfer(); dt.items.add(file);
			const target = document.getElementById(activeId);
			target.files = dt.files;
			showThumb(target);
			closeCropModal();
		}, 'image/jpeg', 0.9);
	}

	function closeCropModal() {
		document.getElementById('crop-modal').style.display = 'none';
		if(cropper) cropper.destroy();
	}

	function showThumb(input) {
		const file = input.files[0];
		if(!file) return;
        const field = input.closest('.field');
        field.classList.remove('error');
		let old = field.querySelector('.thumb-preview'); if(old) old.remove();
		const reader = new FileReader();
		reader.onload = e => {
			const img = document.createElement('img');
			img.src = e.target.result; img.className = 'thumb-preview';
			field.appendChild(img);
		};
		reader.readAsDataURL(file);
	}

	const read = f => new Promise(res => {
		const r = new FileReader();
		r.onload = e => { const i = new Image(); i.onload = () => res(i); i.src = e.target.result; };
		r.readAsDataURL(f);
	});

	async function compressStrict(canvas, limitKB) {
		let q = 0.8, blob, size = Infinity;
		while(size > limitKB && q > 0.05) {
			blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', q));
			size = blob.size / 1024; q -= 0.05;
		}
		if(size > limitKB) {
			const s = document.createElement('canvas');
			s.width = Math.floor(canvas.width * 0.8); s.height = Math.floor(canvas.height * 0.8);
			const ctx = s.getContext('2d');
			ctx.drawImage(canvas, 0, 0, s.width, s.height);
			return compressStrict(s, limitKB);
		}
		return blob;
	}

	async function uploadToDrive() {
		const stat = document.getElementById('status');
		const folderID = document.getElementById('adv_name').value;
		if(!folderID || folderID.includes("Fetching")) return alert("Please wait for Folder ID");

        // VALIDATION
        const reqFields = document.querySelectorAll('.field[data-req="true"]');
        let missing = [];
        reqFields.forEach(f => {
            const input = f.querySelector('input');
            if(!input.files || input.files.length === 0) {
                f.classList.add('error');
                missing.push(f.querySelector('label').innerText.split('*')[0].trim());
            } else {
                f.classList.remove('error');
            }
        });

        if(missing.length > 0) {
            stat.innerHTML = `<b style="color:red">Missing Mandatory Files:<br>${missing.join(', ')}</b>`;
            window.scrollTo({ top: document.querySelector('.error').offsetTop - 50, behavior: 'smooth' });
            return;
        }

		stat.innerHTML = "Processing Documents... <div class='progress-bar'><div class='progress-fill' id='pb'></div></div>";
		const pb = document.getElementById('pb');
		const zip = new JSZip();

		const namingMap = {
			'b_photo': 'Boy_Photo.jpeg', 'g_photo': 'Girl_Photo.jpeg', 
			'w1_photo': 'W1_Photo.jpeg', 'w2_photo': 'W2_Photo.jpeg',
			'b_pan': 'Boy_PAN.jpeg', 'b_mark': 'Boy_Marksheet.jpeg', 'b_aff': 'Boy_Affidavit.jpeg',
			'g_pan': 'Girl_PAN.jpeg', 'g_mark': 'Girl_Marksheet.jpeg', 'g_aff': 'Girl_Affidavit.jpeg',
			'm_cert': 'Marriage_Cert.jpeg', 'w1_aff': 'W1_Affidavit.jpeg'
		};

		const mergedConfigs = [
			{f:'b_af', b:'b_ab', n:'Boy_Aadhar_Merged.jpeg'},
			{f:'g_af', b:'g_ab', n:'Girl_Aadhar_Merged.jpeg'},
			{f:'w1_af', b:'w1_ab', n:'W1_Aadhar_Merged.jpeg'},
			{f:'w2_af', b:'w2_ab', n:'W2_Aadhar_Merged.jpeg'}
		];

		try {
			let totalSteps = 16;
            let done = 0;
			// Aadhar Merging
			for(let m of mergedConfigs) {
				const fInput = document.getElementById(m.f);
				const bInput = document.getElementById(m.b);
				if(fInput.files[0]) {
					const imgF = await read(fInput.files[0]);
					const c = document.createElement('canvas');
					if(bInput.files[0]) {
						const imgB = await read(bInput.files[0]);
						c.width = Math.max(imgF.width, imgB.width);
						c.height = imgF.height + imgB.height + 20;
						const ctx = c.getContext('2d');
						ctx.fillStyle = "white"; ctx.fillRect(0,0,c.width,c.height);
						ctx.drawImage(imgF, (c.width-imgF.width)/2, 0);
						ctx.drawImage(imgB, (c.width-imgB.width)/2, imgF.height+20);
					} else {
						c.width = imgF.width; c.height = imgF.height;
						c.getContext('2d').drawImage(imgF,0,0);
					}
					zip.file(m.n, await compressStrict(c, 60));
				}
				done++; pb.style.width = (done/totalSteps)*100 + "%";
			}

			// Single Files
			for(let [id, fileName] of Object.entries(namingMap)) {
				const input = document.getElementById(id);
				if(input && input.files[0]) {
					const img = await read(input.files[0]);
					const c = document.createElement('canvas');
					c.width = img.width; c.height = img.height;
					c.getContext('2d').drawImage(img, 0, 0);
					const limit = id.includes('photo') ? 20 : 60;
					zip.file(fileName, await compressStrict(c, limit));
				}
				done++; pb.style.width = (done/totalSteps)*100 + "%";
			}

			stat.innerHTML = "Uploading to Cloud...";
			const content = await zip.generateAsync({type:"base64"});
			const formData = new FormData();
			formData.append('zipData', content);
			formData.append('fileName', folderID + ".zip");
			
			await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: formData });
            
            // SHOW CUSTOM POPUP
            document.getElementById('display-id').innerText = folderID;
            document.getElementById('success-modal').style.display = 'flex';

		} catch (e) { 
			stat.innerHTML = "<b style='color:red'>Error: " + e.message + "</b>"; 
		}
	}
</script>
</body>
</html>
